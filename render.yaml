services:
  - type: web
    name: tesign-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_DEPLOYMENT
        value: "true"
      - key: TESIGN_CONFIG_JSON
        sync: false
      - key: SHOPIFY_SHOP
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
